<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CryptoVest Pro — Institutional Access Gateway</title>
    <style>
        :root {
            --bg-body: #060709;
            --white: #ffffff;
            --text-main: #f5f6f9;
            --text-muted: #6f7686;
            --primary-blue: #0052ff;
            --primary-blue-hover: #0045d8;
            --border-dark: #1e222d;
            --card-bg: #0e1118;
            --input-bg: #131722;
            --trend-up: #26a69a;
            --font-stack: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: var(--font-stack);
            -webkit-font-smoothing: antialiased;
        }

        body {
            background-color: var(--bg-body);
            color: var(--text-main);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            background-image:
                radial-gradient(circle at 10% 20%, rgba(0, 82, 255, 0.05) 0%, transparent 40%),
                radial-gradient(circle at 90% 80%, rgba(38, 166, 154, 0.03) 0%, transparent 40%);
        }

        .login-container {
            width: 100%;
            max-width: 440px;
            background: var(--card-bg);
            border: 1px solid var(--border-dark);
            border-radius: 12px;
            padding: 40px 36px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.6);
            position: relative;
        }

        /* Top status bar inside the card */
        .terminal-status-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 32px;
            padding-bottom: 12px;
            border-bottom: 1px solid rgba(30, 34, 45, 0.5);
        }

        .status-node {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-muted);
            font-weight: 600;
        }

        .pulse-dot {
            width: 6px;
            height: 6px;
            background-color: var(--trend-up);
            border-radius: 50%;
            box-shadow: 0 0 8px var(--trend-up);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% {
                opacity: 0.4;
            }

            50% {
                opacity: 1;
            }

            100% {
                opacity: 0.4;
            }
        }

        .system-id {
            font-size: 11px;
            font-family: monospace;
            color: var(--text-muted);
        }

        .login-header {
            text-align: left;
            margin-bottom: 32px;
        }

        .login-header h1 {
            font-size: 24px;
            font-weight: 600;
            letter-spacing: -0.5px;
            margin-bottom: 8px;
            color: var(--white);
        }

        .login-header p {
            color: var(--text-muted);
            font-size: 14px;
            line-height: 1.4;
        }

        .form-group {
            margin-bottom: 24px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            position: relative;
        }

        .form-label {
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.75px;
            color: var(--text-muted);
        }

        .form-input {
            width: 100%;
            padding: 14px 16px;
            background: var(--input-bg);
            border: 1px solid var(--border-dark);
            border-radius: 6px;
            color: var(--white);
            font-size: 14px;
            outline: none;
            transition: all 0.2s ease;
        }

        .form-input:focus {
            border-color: var(--primary-blue);
            box-shadow: 0 0 0 1px var(--primary-blue);
        }

        /* Password container utilities */
        .password-wrapper {
            position: relative;
            width: 100%;
        }

        .password-wrapper .form-input {
            padding-right: 46px;
        }

        .toggle-password-btn {
            position: absolute;
            right: 14px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            font-size: 14px;
            padding: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .toggle-password-btn:hover {
            color: var(--white);
        }

        .login-btn {
            width: 100%;
            padding: 15px;
            background: var(--primary-blue);
            color: var(--white);
            border: none;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.15s ease;
            margin-top: 8px;
            letter-spacing: 0.5px;
        }

        .login-btn:hover {
            background: var(--primary-blue-hover);
        }

        .login-footer {
            margin-top: 36px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
            border-top: 1px solid rgba(30, 34, 45, 0.5);
            padding-top: 20px;
        }

        .security-badges {
            display: flex;
            gap: 16px;
            font-size: 11px;
            color: var(--text-muted);
            font-weight: 500;
        }

        .badge-item {
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .version-tag {
            font-size: 11px;
            color: rgba(111, 118, 134, 0.6);
            font-family: monospace;
        }
    </style>
</head>

<body>

    <div class="login-container">
        <div class="terminal-status-bar">
            <div class="status-node">
                <div class="pulse-dot"></div>
                <span>Secured Mainnet Link</span>
            </div>
            <div class="system-id">node_v4.85-prod</div>
        </div>

        <div class="login-header">
            <h1>CryptoVest Pro</h1>
            <p>Authorized personnel terminal verification portal.</p>
        </div>

        <form onsubmit="handleSessionVerification(event)">
            <div class="form-group">
                <label class="form-label" for="operator-id">Operator Identifier</label>
                <input type="email" class="form-input" id="operator-id" required
                    placeholder="Marcian.cromwell@gmail.com" autocomplete="username">
            </div>

            <div class="form-group">
                <label class="form-label" for="operator-key">Secure Access Key</label>
                <div class="password-wrapper">
                    <input type="password" class="form-input" id="operator-key" required placeholder="••••••••"
                        autocomplete="current-password">
                    <button type="button" class="toggle-password-btn" onclick="togglePasswordVisibility()"
                        aria-label="Toggle password visibility">👁️</button>
                </div>
            </div>

            <button type="submit" class="login-btn">Authenticate Session Identity</button>
        </form>

        <div class="login-footer">
            <div class="security-badges">
                <div class="badge-item">🛡️ AES-256</div>
                <div class="badge-item">🔑 TLS 1.3</div>
                <div class="badge-item">🔒 Hardware Bound</div>
            </div>
            <div class="version-tag">Build Context: 2026-CS-TERMINAL</div>
        </div>
    </div>

    <script>
        function togglePasswordVisibility() {
            const passwordInput = document.getElementById('operator-key');
            const toggleBtn = document.querySelector('.toggle-password-btn');
            if (passwordInput.type === "password") {
                passwordInput.type = "text";
                toggleBtn.innerText = "🙈";
            } else {
                passwordInput.type = "password";
                toggleBtn.innerText = "👁️";
            }
        }

        function handleSessionVerification(e) {
            e.preventDefault();

            const identifier = document.getElementById('operator-id').value.trim();
            const accessKeyCode = document.getElementById('operator-key').value;

            // Strict Institutional Target Matrix
            const correctEmail = "Marcian.cromwell@gmail.com";
            const correctPassword = "1SasQuatch!";

            if (identifier === correctEmail && accessKeyCode === correctPassword) {
                // Route directly to primary terminal workspace interface
                // dashboard.html does not exist in this workspace; redirect to index.html
                window.location.href = "dashboard.html";
            } else {
                // Deny, execute input purge, return error code layout context
                alert("❌ Authentication Failure: Invalid Operator Credentials. Core Terminal access rejected.");
                document.getElementById('operator-key').value = "";
            }
        }
    </script>
</body>

</html>
